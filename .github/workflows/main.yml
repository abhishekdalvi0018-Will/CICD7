name: CI/CD Pipeline

on:
  push:
    branches:
      - main  # Trigger on push to the 'main' branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set up Node.js (optional if using JS tools like npm)
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install Dependencies (optional if using npm or other tools)
        run: npm install

      - name: Build Website
        run: npm run build  # Add a build command if needed (e.g., React build, etc.)

      - name: Deploy to GitHub Pages
        run: |
          mkdir docs
          cp -r * docs/
          cd docs
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Deploying Lenskart clone"
          git push --force https://github.com/${{ github.repository }} HEAD:gh-pages
